---
layout: default
---

<div class="page-container container animate-fade-in">
  <header class="page-header-standard">
    <h1 class="page-title-standard">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="page-subtitle-standard">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="page-body-content">
    {{ content }}
  </div>
</div>
