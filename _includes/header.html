<header class="site-header">
  <div class="header-container container">
    <!-- Brand Logo -->
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <span class="logo-dot"></span>
      <span class="brand-text">Aether &amp; Code</span>
    </a>

    <!-- Navigations -->
    <nav class="site-navigation" id="site-navigation" aria-label="Main Navigation">
      <ul class="nav-list">
        {% for link in site.navigation %}
          {% assign current_url_check = link.url | relative_url %}
          {% assign page_url_check = page.url | relative_url %}
          <li class="nav-item">
            <a href="{{ link.url | relative_url }}" class="nav-link {% if page_url_check == current_url_check %}active{% endif %}">
              {{ link.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>

    <!-- Header Actions -->
    <div class="header-actions">
      <!-- Theme Switcher Button -->
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <!-- Sun Icon -->
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon Icon -->
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <!-- Mobile Menu Toggle Button -->
      <button id="mobile-menu-toggle" class="mobile-menu-btn" aria-label="Toggle Menu" aria-expanded="false">
        <!-- Menu Icon -->
        <svg class="menu-open-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
        <!-- Close Icon -->
        <svg class="menu-close-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>
</header>
