# Jekyll Configuration

# Site Settings
title: "Aether & Code"
tagline: "Exploring Web Aesthetics, Software Engineering & AI"
description: "A developer blog exploring clean code, beautiful web design patterns, and next-generation AI interfaces."
url: "https://yourusername.github.io" # Replace with your site's URL
baseurl: "" # Required if hosting in a subdirectory (e.g., /blog)

# Author Information
author:
  name: "Aether Developer"
  email: "aether@example.com"
  bio: "A passionate full-stack software engineer designing modern interactive web architectures."
  avatar: "/assets/images/avatar.png"
  github: "github_username"
  twitter: "twitter_username"
  linkedin: "linkedin_username"

# Build Settings
permalink: /blog/:title/
markdown: kramdown
highlighter: rouge

# Kramdown Settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Navigation links
navigation:
  - title: "Home"
    url: "/"
  - title: "About"
    url: "/about/"
  - title: "Archive"
    url: "/archive/"
  - title: "Contact"
    url: "/contact/"

# Exclude list from Jekyll build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - .github/
  - .gitignore
  - LICENSE.txt

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
